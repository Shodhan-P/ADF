name: Deploy ADF to UAT

on:
  push:
    branches:
      - adf_publish
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout adf_publish branch
      uses: actions/checkout@v4
      with:
        ref: adf_publish

    - name: Azure Login
      uses: azure/login@v1
      with:
         creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

    - name: Deploy ARM Template
      uses: azure/arm-deploy@v2
      with:
        resourceGroupName: Shodhan_POC_RG
        template: DFPOCShodhan/ARMTemplateForFactory.json
        parameters: DFPOCShodhan/ARMTemplateParametersForFactory.json factoryName=SH-UAT
